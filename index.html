<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Азбука: Остров Сокровищ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1CB0F6">
</head>
<body>
<div class="app-container">

    <!-- ░░ ЭКРАН: ИМЯ РОБОТА ░░ -->
    <div id="screen-setup" class="screen active">
        <div class="setup-robot">🤖</div>
        <h1>Привет, Друг!</h1>
        <p>Я твой новый помощник.<br>Как ты меня назовёшь?</p>
        <input type="text" id="robot-name-input" class="input-name" placeholder="Введи имя...">
        <button class="game-btn btn-green" onclick="saveRobotName()">ПОГНАЛИ! 🚀</button>
    </div>

    <!-- ░░ ЭКРАН: КАРТА ░░ -->
    <div id="screen-map" class="screen">
        <div class="header-panel">
            <div class="stats-badge">
                <span id="robot-icon">⚙️</span>
                <span id="robot-name-display">Бот</span>
            </div>
            <div class="stats-badge orange">⭐ <span id="xp-display">0</span></div>
            <div class="stats-badge red">🔥 <span id="streak-display">0</span></div>
        </div>

        <div class="map-bg">
            <div class="island" id="isl-letters" onclick="startLevel('letters')">
                <span style="font-size:3rem">🅰️</span>
                <div class="island-label">Остров Букв</div>
                <div class="island-progress" id="prog-letters"></div>
            </div>
            <div class="path-arrow">↓</div>
            <div class="island locked" id="isl-syllables" onclick="startLevel('syllables')">
                <span style="font-size:3rem">🧩</span>
                <div class="island-label">Остров Слогов</div>
                <div class="island-progress" id="prog-syllables"></div>
            </div>
            <div class="path-arrow">↓</div>
            <div class="island locked" id="isl-words" onclick="startLevel('words')">
                <span style="font-size:3rem">💎</span>
                <div class="island-label">Город Слов</div>
                <div class="island-progress" id="prog-words"></div>
            </div>
        </div>

        <div class="badges-panel" id="badges-panel"></div>
    </div>

    <!-- ░░ ЭКРАН: ИГРА ░░ -->
    <div id="screen-game" class="screen game-screen">
        <div class="game-header">
            <button onclick="goMap()" class="icon-btn">🗺️</button>
            <div id="progress-tag" class="prog-tag">1 / 33</div>
            <button onclick="speakCurrent()" class="icon-btn">🔊</button>
        </div>

        <!-- Фаза 1: Карточка -->
        <div id="phase-card" class="phase">
            <div id="card-emoji" class="big-emoji">🍎</div>
            <div id="card-char" class="big-char">А</div>
            <div id="card-word" class="card-word">АРБУЗ</div>
            <button class="game-btn btn-blue" onclick="startQuiz()">ПРОВЕРЬ МЕНЯ! 🎯</button>
        </div>

        <!-- Фаза 2: Викторина -->
        <div id="phase-quiz" class="phase hidden">
            <div id="quiz-prompt" class="quiz-prompt">С какой буквой эта картинка?</div>
            <div id="quiz-emoji" class="big-emoji">🍎</div>
            <div id="quiz-options" class="options-grid"></div>
        </div>

        <!-- Фаза 3: Обратная связь -->
        <div id="phase-feedback" class="phase hidden feedback-phase">
            <div id="fb-icon" style="font-size:5rem">🎉</div>
            <div id="fb-text" class="fb-text">Правильно!</div>
            <div id="fb-sub" class="fb-sub">+10 ⭐</div>
            <button class="game-btn btn-green" onclick="nextStep()">ДАЛЬШЕ ➡️</button>
        </div>
    </div>

    <!-- ░░ ЭКРАН: ПОБЕДА ░░ -->
    <div id="screen-victory" class="screen victory-screen">
        <canvas id="confetti-canvas"></canvas>
        <div class="victory-body">
            <div id="vic-icon" style="font-size:6rem">🏆</div>
            <h1 id="vic-title">Остров пройден!</h1>
            <div id="vic-xp" class="vic-xp">+50 ⭐ Бонус!</div>
            <div id="vic-badge"></div>
            <button class="game-btn btn-green" onclick="showMap()">НА КАРТУ 🗺️</button>
            <button class="game-btn btn-outline" onclick="replayLevel()" style="margin-top:12px">ЕЩЁ РАЗ 🔄</button>
        </div>
    </div>

</div>
<script src="app.js"></script>
</body>
</html>
