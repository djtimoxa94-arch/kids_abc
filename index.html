<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Азбука: Эволюция Робота</title>
    <style>
        :root {
            --bg: #F0F9FF;
            --green: #58CC02;
            --green-dark: #46A302;
            --blue: #1CB0F6;
            --blue-dark: #1899D6;
            --orange: #FF9600;
            --text: #4B4B4B;
        }

        body {
            margin: 0;
            font-family: 'Rounded Mplus 1c', 'Comic Sans MS', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            user-select: none;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* Личный кабинет */
        .user-panel {
            padding: 15px;
            background: #fff;
            border-bottom: 2px solid #E5E5E5;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar-container {
            width: 65px;
            height: 65px;
            background: #F7F7F7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            border: 3px solid var(--blue);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .stats { flex: 1; }
        .xp-bar-bg {
            width: 100%;
            height: 12px;
            background: #eee;
            border-radius: 6px;
            margin-top: 5px;
            overflow: hidden;
        }
        .xp-bar-fill {
            height: 100%;
            background: var(--orange);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Экраны */
        .screen { padding: 20px; flex: 1; overflow-y: auto; text-align: center; display: none; }
        .active { display: block; }

        .level-card {
            background: white;
            border: 2px solid #E5E5E5;
            border-bottom: 6px solid #E5E5E5;
            border-radius: 20px;
            margin-bottom: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.1s;
        }
        .level-card:active { transform: translateY(4px); border-bottom-width: 2px; }

        /* Игровой процесс */
        .progress-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .progress-line { flex: 1; height: 10px; background: #eee; border-radius: 5px; overflow: hidden; }
        .progress-line-fill { height: 100%; background: var(--green); width: 0%; transition: width 0.3s; }

        .big-char { font-size: 8rem; color: var(--blue); font-weight: bold; margin: 10px 0; line-height: 1; }
        .btn-action {
            background: var(--green);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 20px;
            font-size: 1.4rem;
            font-weight: bold;
            border-bottom: 6px solid var(--green-dark);
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
            transition: all 0.1s;
        }
        .btn-action:active { transform: translateY(4px); border-bottom-width: 2px; }

        .back-btn { background: none; border: none; font-size: 2rem; cursor: pointer; padding: 0; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="user-panel">
        <div id="user-avatar" class="avatar-container">⚙️</div>
        <div class="stats">
            <div style="font-weight: bold; font-size: 1.1rem;"><span id="robot-name">Новичок</span></div>
            <div style="font-size: 0.85rem; color: #666;">Опыт: <span id="xp-text">0</span> XP</div>
            <div class="xp-bar-bg"><div id="xp-fill" class="xp-bar-fill"></div></div>
        </div>
    </div>

    <div id="screen-menu" class="screen active">
        <h2 style="color: var(--blue); margin-top: 10px;">Чему научимся сегодня?</h2>
        <div id="levels-list"></div>
    </div>

    <div id="screen-game" class="screen">
        <div class="progress-header">
            <button class="back-btn" onclick="showMenu()">🔙</button>
            <div class="progress-line"><div id="game-progress-fill" class="progress-line-fill"></div></div>
        </div>
        
        <div class="main-content">
            <div id="display-emoji" style="font-size: 6rem; margin-bottom: 10px;"></div>
            <div id="display-text" class="big-char">А</div>
            <div id="display-word" style="font-size: 2rem; font-weight: bold; margin-bottom: 30px; height: 2.5rem;"></div>
            
            <button class="btn-action" onclick="handleSpeak()">🔊 ПОСЛУШАТЬ</button>
            <button class="btn-action" style="background: var(--blue); border-bottom-color: var(--blue-dark);" onclick="nextStep()">ДАЛЬШЕ ➡️</button>
        </div>
    </div>
</div>

<script>
    const gameData = {
        letters: [
            { t: 'А', w: 'Арбуз', e: '🍉' }, { t: 'Б', w: 'Барабан', e: '🥁' }, { t: 'В', w: 'Вишня', e: '🍒' },
            { t: 'Г', w: 'Гитара', e: '🎸' }, { t: 'Д', w: 'Дом', e: '🏠' }, { t: 'Е', w: 'Енот', e: '🦝' },
            { t: 'Ё', w: 'Ёжик', e: '🦔' }, { t: 'Ж', w: 'Жираф', e: '🦒' }, { t: 'З', w: 'Зебра', e: '🦓' },
            { t: 'И', w: 'Иголка', e: '🪡' }, { t: 'Й', w: 'Йогурт', e: '🍦' }, { t: 'К', w: 'Кот', e: '🐈' },
            { t: 'Л', w: 'Лев', e: '🦁' }, { t: 'М', w: 'Мяч', e: '⚽' }, { t: 'Н', w: 'Носки', e: '🧦' },
            { t: 'О', w: 'Очки', e: '👓' }, { t: 'П', w: 'Петух', e: '🐓' }, { t: 'Р', w: 'Рыба', e: '🐟' },
            { t: 'С', w: 'Слон', e: '🐘' }, { t: 'Т', w: 'Торт', e: '🎂' }, { t: 'У', w: 'Утка', e: '🦆' },
            { t: 'Ф', w: 'Флаг', e: '🚩' }, { t: 'Х', w: 'Хлеб', e: '🍞' }, { t: 'Ц', w: 'Цветок', e: '🌸' },
            { t: 'Ч', w: 'Часы', e: '⌚' }, { t: 'Ш', w: 'Шарик', e: '🎈' }, { t: 'Щ', w: 'Щетка', e: '🪥' },
            { t: 'Ъ', w: 'Объезд', e: '🚧' }, { t: 'Ы', w: 'Мышь', e: '🐭' }, { t: 'Ь', w: 'Медведь', e: '🧸' },
            { t: 'Э', w: 'Экран', e: '📺' }, { t: 'Ю', w: 'Юбка', e: '👗' }, { t: 'Я', w: 'Яблоко', e: '🍎' }
        ],
        syllables: [
            { t: 'МА', w: 'МА-МА', e: '👩' }, { t: 'ПА', w: 'ПА-ПА', e: '👨' }, { t: 'БА', w: 'БА-БА', e: '👵' },
            { t: 'КО', w: 'КО-Т', e: '🐈' }, { t: 'МО', w: 'МО-РЕ', e: '🌊' }, { t: 'ЛУ', w: 'ЛУ-НА', e: '🌙' }
        ],
        words: [
            { t: 'МАМА', e: '❤️' }, { t: 'ПАПА', e: '🏠' }, { t: 'КОТ', e: '🐈' },
            { t: 'ДОМ', e: '🏘️' }, { t: 'РЫБА', e: '🐟' }, { t: 'ЛЕС', e: '🌲' }
        ]
    };

    const levels = [
        { id: 'letters', title: 'Учим буквы', icon: '🅰️', desc: 'Основы алфавита' },
        { id: 'syllables', title: 'Складываем слоги', icon: '🧩', desc: 'Первые шаги к чтению' },
        { id: 'words', title: 'Целые слова', icon: '🐱', desc: 'Учимся читать быстро' }
    ];

    let state = JSON.parse(localStorage.getItem('abc_v5_state')) || { xp: 0 };
    let currentLvlId = null;
    let currentIndex = 0;

    function updateAvatar() {
        const avatar = document.getElementById('user-avatar');
        const nameText = document.getElementById('robot-name');
        const xpFill = document.getElementById('xp-fill');
        const xpText = document.getElementById('xp-text');

        if (state.xp < 100) { avatar.textContent = '⚙️'; nameText.textContent = 'Робот-ученик'; }
        else if (state.xp < 300) { avatar.textContent = '🤖'; nameText.textContent = 'Умный Бот'; }
        else { avatar.textContent = '🚀'; nameText.textContent = 'Супер-Мозг'; }

        const progress = Math.min((state.xp / 500) * 100, 100);
        xpFill.style.width = progress + '%';
        xpText.textContent = state.xp;
        localStorage.setItem('abc_v5_state', JSON.stringify(state));
    }

    function showMenu() {
        document.getElementById('screen-menu').classList.add('active');
        document.getElementById('screen-game').classList.remove('active');
        renderMenu();
    }

    function renderMenu() {
        const list = document.getElementById('levels-list');
        list.innerHTML = levels.map(l => `
            <div class="level-card" onclick="startLevel('${l.id}')">
                <div style="font-size: 2.5rem; margin-right: 20px;">${l.icon}</div>
                <div style="text-align: left;">
                    <div style="font-weight: bold; font-size: 1.2rem;">${l.title}</div>
                    <div style="font-size: 0.85rem; color: #999;">${l.desc}</div>
                </div>
            </div>
        `).join('');
    }

    function startLevel(id) {
        currentLvlId = id;
        currentIndex = 0;
        document.getElementById('screen-menu').classList.remove('active');
        document.getElementById('screen-game').classList.add('active');
        updateGameUI();
    }

    function updateGameUI() {
        const items = gameData[currentLvlId];
        const item = items[currentIndex];
        document.getElementById('display-text').textContent = item.t;
        document.getElementById('display-word').textContent = item.w || '';
        document.getElementById('display-emoji').textContent = item.e || '';
        
        const prog = ((currentIndex + 1) / items.length) * 100;
        document.getElementById('game-progress-fill').style.width = prog + '%';
        
        handleSpeak();
    }

    function nextStep() {
        state.xp += 10;
        updateAvatar();

        if (currentIndex < gameData[currentLvlId].length - 1) {
            currentIndex++;
            updateGameUI();
        } else {
            playVictory();
            alert("ПОЗДРАВЛЯЕМ! Уровень пройден! ⭐");
            showMenu();
        }
    }

    function handleSpeak() {
        const item = gameData[currentLvlId][currentIndex];
        speak(item.t + (item.w ? "... " + item.w : ""));
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const ut = new SpeechSynthesisUtterance(text);
        ut.lang = 'ru-RU';
        ut.rate = 0.85;
        ut.pitch = 1.25;
        window.speechSynthesis.speak(ut);
    }

    function playVictory() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [523, 659, 783, 1046].forEach((f, i) => {
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.frequency.value = f;
            g.gain.setValueAtTime(0.1, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1);
            osc.connect(g); g.connect(ctx.destination);
            osc.start(ctx.currentTime + i * 0.1); osc.stop(ctx.currentTime + 1);
        });
    }

    updateAvatar();
    renderMenu();
</script>
</body>
</html>
