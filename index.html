<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Азбука: Остров Сокровищ</title>
    <style>
        :root {
            --sky: #1CB0F6; --grass: #58CC02; --path: #FFC800; --text: #4B4B4B; --orange: #FF9600;
        }
        body { margin: 0; font-family: 'Rounded Mplus 1c', 'Segoe UI', sans-serif; background: #235391; color: var(--text); display: flex; justify-content: center; overflow: hidden; }
        .app-container { width: 100%; max-width: 450px; height: 100vh; background: #F0F9FF; display: flex; flex-direction: column; position: relative; }
        
        /* Экраны */
        .screen { display: none; flex-direction: column; height: 100%; overflow-y: auto; text-align: center; }
        .active { display: flex !important; }

        /* Экран Имени */
        #screen-setup { background: white; align-items: center; justify-content: center; padding: 30px; }
        .input-name { padding: 15px; font-size: 1.2rem; border-radius: 15px; border: 3px solid var(--sky); width: 80%; margin: 20px 0; outline: none; text-align: center; }
        
        /* Карта */
        .map-bg { flex: 1; background: linear-gradient(to bottom, #1CB0F6, #58CC02); padding: 60px 20px; display: flex; flex-direction: column; align-items: center; gap: 50px; }
        .island { width: 130px; height: 130px; background: white; border-radius: 50%; border: 6px solid var(--path); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; box-shadow: 0 10px 0 #E5B300; transition: 0.2s; z-index: 2; }
        .island:active { transform: translateY(5px); box-shadow: 0 5px 0 #E5B300; }
        .island.locked { filter: grayscale(1); opacity: 0.6; cursor: not-allowed; }
        .island-label { position: absolute; bottom: -35px; background: white; padding: 5px 15px; border-radius: 15px; font-weight: bold; white-space: nowrap; border: 2px solid var(--path); }

        /* Мини-статус */
        .header-panel { padding: 10px; background: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #eee; }
        .stats-badge { background: #f0f0f0; padding: 5px 12px; border-radius: 20px; font-weight: bold; display: flex; align-items: center; gap: 5px; }

        /* Игра */
        .game-screen { background: white; padding: 20px; }
        .big-char { font-size: 10rem; font-weight: bold; color: var(--sky); margin: 10px 0; line-height: 1; }
        .game-btn { background: var(--grass); color: white; border: none; padding: 22px; border-radius: 20px; font-size: 1.6rem; font-weight: bold; border-bottom: 6px solid #46A302; cursor: pointer; width: 100%; margin-top: auto; }
        .game-btn:active { transform: translateY(3px); border-bottom-width: 3px; }

        /* Сундук */
        .chest-anim { font-size: 6rem; animation: shake 0.5s infinite; }
        @keyframes shake { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(-10deg); } 75% { transform: rotate(10deg); } }
    </style>
</head>
<body>

<div class="app-container">
    <div id="screen-setup" class="screen active">
        <div style="font-size: 6rem;">🤖</div>
        <h1>Привет, Друг!</h1>
        <p>Я твой новый помощник. <br>Как ты меня назовёшь?</p>
        <input type="text" id="robot-name-input" class="input-name" placeholder="Введи имя...">
        <button class="game-btn" onclick="saveRobotName()">ПОГНАЛИ! 🚀</button>
    </div>

    <div id="screen-map" class="screen">
        <div class="header-panel">
            <div class="stats-badge"><span id="robot-icon">⚙️</span> <span id="robot-name-display">Бот</span></div>
            <div class="stats-badge" style="color: var(--orange)">⭐ <span id="xp-display">0</span></div>
        </div>
        <div class="map-bg">
            <div class="island" onclick="startLevel('letters')">
                <span style="font-size: 3.5rem;">🅰️</span>
                <div class="island-label">Остров Букв</div>
            </div>
            <div class="island" id="isl-syllables" onclick="startLevel('syllables')">
                <span style="font-size: 3.5rem;">🧩</span>
                <div class="island-label">Остров Слогов</div>
            </div>
            <div class="island" id="isl-words" onclick="startLevel('words')">
                <span style="font-size: 3.5rem;">💎</span>
                <div class="island-label">Город Слов</div>
            </div>
        </div>
    </div>

    <div id="screen-game" class="screen game-screen">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <button onclick="showMap()" style="background: none; border: none; font-size: 2.5rem; cursor: pointer;">🗺️</button>
            <div id="progress-tag" style="background: #eee; padding: 5px 15px; border-radius: 10px; font-weight: bold;">1 / 33</div>
        </div>
        <div id="game-content" style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <div id="game-emoji" style="font-size: 6rem;">🍎</div>
            <div id="game-char" class="big-char">А</div>
            <div id="game-word" style="font-size: 2.8rem; font-weight: bold; color: #333; margin-bottom: 30px;">АРБУЗ</div>
            <button class="game-btn" onclick="nextStep()">ДАЛЬШЕ 🔊</button>
        </div>
    </div>
</div>

<script>
    const data = {
        letters: [
            {t:'А', w:'Арбуз', e:'🍉'}, {t:'Б', w:'Барабан', e:'🥁'}, {t:'В', w:'Вишня', e:'🍒'}, {t:'Г', w:'Гитара', e:'🎸'},
            {t:'Д', w:'Дом', e:'🏠'}, {t:'Е', w:'Енот', e:'🦝'}, {t:'Ё', w:'Ёжик', e:'🦔'}, {t:'Ж', w:'Жираф', e:'🦒'},
            {t:'З', w:'Зебра', e:'🦓'}, {t:'И', w:'Иголка', e:'🪡'}, {t:'Й', w:'Йогурт', e:'🍦'}, {t:'К', w:'Кот', e:'🐈'},
            {t:'Л', w:'Лев', e:'🦁'}, {t:'М', w:'Мяч', e:'⚽'}, {t:'Н', w:'Носки', e:'🧦'}, {t:'О', w:'Очки', e:'👓'},
            {t:'П', w:'Петух', e:'🐓'}, {t:'Р', w:'Рыба', e:'🐟'}, {t:'С', w:'Слон', e:'🐘'}, {t:'Т', w:'Торт', e:'🎂'},
            {t:'У', w:'Утка', e:'🦆'}, {t:'Ф', w:'Флаг', e:'🚩'}, {t:'Х', w:'Хлеб', e:'🍞'}, {t:'Ц', w:'Цветок', e:'🌸'},
            {t:'Ч', w:'Часы', e:'⌚'}, {t:'Ш', w:'Шарик', e:'🎈'}, {t:'Щ', w:'Щетка', e:'🪥'}, {t:'Ъ', w:'Объезд', e:'🚧'},
            {t:'Ы', w:'Мышь', e:'🐭'}, {t:'Ь', w:'Медведь', e:'🧸'}, {t:'Э', w:'Экран', e:'📺'}, {t:'Ю', w:'Юбка', e:'👗'}, {t:'Я', w:'Яблоко', e:'🍎'}
        ],
        syllables: [
            {t:'МА', w:'МА-МА', e:'👩'}, {t:'ПА', w:'ПА-ПА', e:'👨'}, {t:'БА', w:'БА-БА', e:'👵'}, {t:'КО', w:'КО-Ш-КА', e:'🐈'},
            {t:'МО', w:'МО-РЕ', e:'🌊'}, {t:'ЛУ', w:'ЛУ-НА', e:'🌙'}, {t:'ДО', w:'ДО-МИК', e:'🏠'}
        ],
        words: [
            {t:'МАМА', e:'❤️'}, {t:'ПАПА', e:'🏠'}, {t:'КОТ', e:'🐈'}, {t:'ДОМ', e:'🏘️'}, {t:'РЫБА', e:'🐟'}, {t:'ЛУНА', e:'🌙'}
        ]
    };

    let state = JSON.parse(localStorage.getItem('abc_v8_save')) || { xp: 0, robotName: '', unlocked: ['letters'] };
    let curLvl = null, curIdx = 0;

    function save() { localStorage.setItem('abc_v8_save', JSON.stringify(state)); updateMap(); }

    function speak(text) {
        window.speechSynthesis.cancel();
        const ut = new SpeechSynthesisUtterance(text);
        ut.lang = 'ru-RU';
        ut.rate = 0.8;
        ut.pitch = 1.35; // Делаем голос более детским и мягким
        window.speechSynthesis.speak(ut);
    }

    function saveRobotName() {
        const val = document.getElementById('robot-name-input').value.trim();
        if(!val) return alert("Дай мне имя!");
        state.robotName = val;
        speak(`Привет! Я ${state.robotName}. Давай учиться читать вместе! Нажми на первый остров.`);
        showMap();
        save();
    }

    function updateMap() {
        document.getElementById('robot-name-display').textContent = state.robotName;
        document.getElementById('xp-display').textContent = state.xp;
        document.getElementById('robot-icon').textContent = state.xp > 150 ? '🚀' : (state.xp > 50 ? '🤖' : '⚙️');
        
        ['syllables', 'words'].forEach(id => {
            const el = document.getElementById('isl-' + id);
            if(state.unlocked.includes(id)) el.classList.remove('locked');
            else el.classList.add('locked');
        });
    }

    function showMap() {
        if(!state.robotName) return;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-map').classList.add('active');
        updateMap();
    }

    function startLevel(id) {
        if(id !== 'letters' && !state.unlocked.includes(id)) return speak("Сначала пройди предыдущий остров!");
        curLvl = id; curIdx = 0;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-game').classList.add('active');
        updateGame();
    }

    function updateGame() {
        const item = data[curLvl][curIdx];
        document.getElementById('game-char').textContent = item.t;
        document.getElementById('game-word').textContent = item.w || '';
        document.getElementById('game-emoji').textContent = item.e || '';
        document.getElementById('progress-tag').textContent = `${curIdx + 1} / ${data[curLvl].length}`;
        speak(item.t + (item.w ? "... " + item.w : ""));
    }

    function nextStep() {
        state.xp += 5;
        if(curIdx < data[curLvl].length - 1) {
            curIdx++;
            updateGame();
        } else {
            if(curLvl === 'letters') state.unlocked.push('syllables');
            if(curLvl === 'syllables') state.unlocked.push('words');
            speak("Ура! Мы нашли сокровища! Остров пройден!");
            showMap();
        }
        save();
    }

    if(state.robotName) showMap();
</script>
</body>
</html>
