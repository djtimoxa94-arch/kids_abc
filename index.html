<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Азбука: Остров Сокровищ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0e9fff">
</head>
<body>

<!-- ПРИВЕТСТВИЕ -->
<div id="screen-setup" class="screen active">
  <div class="setup-deco">
    <div class="cloud c1">☁️</div><div class="cloud c2">☁️</div>
    <div class="sun">🌞</div><div class="palm p1">🌴</div><div class="palm p2">🌴</div>
  </div>
  <div class="setup-card">
    <div class="mascot-row">
      <div class="mascot">🦜</div>
      <div class="bubble">Привет! Я Кеша!</div>
    </div>
    <h1 class="title">Остров<br><span>Сокровищ</span></h1>
    <p class="sub">Как тебя зовут, мореплаватель?</p>
    <input id="robot-name-input" class="name-input" placeholder="Введи имя...">
    <button class="btn btn-green" onclick="saveRobotName()">ПОГНАЛИ 🚀</button>
  </div>
</div>

<!-- КАРТА -->
<div id="screen-map" class="screen">
  <div class="map-header">
    <div class="chip"><span id="robot-icon">🦜</span><span id="robot-name-display">Игрок</span></div>
    <div class="stats">
      <div class="pill gold">⭐<span id="xp-display">0</span></div>
      <div class="pill fire">🔥<span id="streak-display">0</span></div>
    </div>
  </div>
  <div class="map-body">
    <div class="path-line"></div>
    <div class="island-node" id="isl-words" onclick="startLevel('words')">
      <div class="glow glow-purple"></div>
      <div class="isl-btn"><span class="isl-icon">💎</span></div>
      <div class="isl-label">Слова</div>
      <div class="isl-badge" id="prog-words"></div>
    </div>
    <div class="island-node shift-right" id="isl-syllables" onclick="startLevel('syllables')">
      <div class="glow glow-green"></div>
      <div class="isl-btn"><span class="isl-icon">🧩</span></div>
      <div class="isl-label">Слоги</div>
      <div class="isl-badge" id="prog-syllables"></div>
    </div>
    <div class="island-node" id="isl-letters" onclick="startLevel('letters')">
      <div class="glow glow-orange"></div>
      <div class="isl-btn"><span class="isl-icon">🅰️</span></div>
      <div class="isl-label">Буквы</div>
      <div class="isl-badge" id="prog-letters"></div>
    </div>
  </div>
  <div class="badges-strip" id="badges-panel"></div>
</div>

<!-- ИГРА -->
<div id="screen-game" class="screen game-screen">
  <div class="game-hdr">
    <button class="hdr-btn" onclick="goMap()">🗺️</button>
    <div class="prog-wrap"><div class="prog-fill" id="progress-fill"></div><span class="prog-lbl" id="progress-tag">1/33</span></div>
    <button class="hdr-btn" onclick="speakCurrent()">🔊</button>
  </div>

  <div id="phase-card" class="phase">
    <div class="card-layout">
      <div id="card-emoji" class="c-emoji">🍎</div>
      <div class="card-info">
        <div id="card-char" class="c-char">А</div>
        <div id="card-word" class="c-word">АРБУЗ</div>
        <button class="btn btn-yellow" onclick="startQuiz()">ПРОВЕРЬ 🎯</button>
      </div>
    </div>
  </div>

  <div id="phase-quiz" class="phase hidden">
    <div class="quiz-layout">
      <div class="quiz-top">
        <div id="quiz-prompt" class="q-prompt">Что это?</div>
        <div id="quiz-emoji" class="q-emoji">🍎</div>
      </div>
      <div id="quiz-options" class="opts-grid"></div>
    </div>
  </div>

  <div id="phase-feedback" class="phase hidden">
    <div class="fb-layout">
      <div id="fb-icon" class="fb-icon">🎉</div>
      <div id="fb-text" class="fb-text">Правильно!</div>
      <div id="fb-sub" class="fb-xp">+10 ⭐</div>
      <button class="btn btn-green" onclick="nextStep()">ДАЛЬШЕ ➡️</button>
    </div>
  </div>
</div>

<!-- ПОБЕДА -->
<div id="screen-victory" class="screen">
  <canvas id="confetti-canvas" class="confetti-cv"></canvas>
  <div class="vic-wrap">
    <div class="vic-card">
      <span id="vic-icon" class="vic-trophy">🏆</span>
      <h1 id="vic-title">Пройдено!</h1>
      <div id="vic-xp" class="vic-xp">+50 ⭐</div>
      <div id="vic-badge"></div>
      <button class="btn btn-green" onclick="showMap()">НА КАРТУ 🗺️</button>
      <button class="btn btn-ghost" onclick="replayLevel()">ЕЩЁ РАЗ 🔄</button>
    </div>
  </div>
</div>

<div id="star-burst" class="star-burst hidden"></div>
<script src="app.js"></script>
</body>
</html>
